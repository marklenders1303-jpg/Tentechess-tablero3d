<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tablero 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; color: white; font-family: Arial, sans-serif; text-shadow: 1px 1px 2px black; pointer-events: none; }
    </style>
</head>
<body>
    <div id="info">Arrastra el ratón para rotar la cámara</div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 1. Escena y color de fondo (Azul cielo para confirmar que funciona)
        const escena = new THREE.Scene();
        escena.background = new THREE.Color(0x87CEEB); 

        // 2. Cámara
        const camara = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camara.position.set(0, 10, 15);
        camara.lookAt(0, 0, 0);

        // 3. Renderizador
        const renderizador = new THREE.WebGLRenderer({ antialias: true });
        renderizador.setSize(window.innerWidth, window.innerHeight);
        renderizador.setPixelRatio(window.devicePixelRatio); // Mejora la nitidez
        document.body.appendChild(renderizador.domElement);

        // 4. Controles (ratón)
        const controles = new THREE.OrbitControls(camara, renderizador.domElement);
        controles.enableDamping = true; // Movimiento más suave

        // 5. Crear el Tablero (8x8)
        const tamanoCasilla = 1;
        for (let fila = 0; fila < 8; fila++) {
            for (let col = 0; col < 8; col++) {
                const esBlanca = (fila + col) % 2 === 0;
                const colorCasilla = esBlanca ? 0xeeeeee : 0x444444;

                const geometria = new THREE.BoxGeometry(tamanoCasilla, 0.2, tamanoCasilla);
                const material = new THREE.MeshStandardMaterial({ color: colorCasilla });
                const casilla = new THREE.Mesh(geometria, material);

                casilla.position.set(col - 3.5, 0, fila - 3.5);
                escena.add(casilla);
            }
        }

        // 6. Luces
        const luz = new THREE.PointLight(0xffffff, 1, 100);
        luz.position.set(5, 10, 5);
        escena.add(luz);
        escena.add(new THREE.AmbientLight(0x606060));

        // 7. Auto-ajuste para cuando se redimensiona el Iframe o la ventana
        window.addEventListener('resize', function() {
            camara.aspect = window.innerWidth / window.innerHeight;
            camara.updateProjectionMatrix();
            renderizador.setSize(window.innerWidth, window.innerHeight);
        });

        // 8. Bucle de animación
        function animar() {
            requestAnimationFrame(animar);
            controles.update();
            renderizador.render(escena, camara);
        }
        
        animar();
    </script>
</body>
</html>
